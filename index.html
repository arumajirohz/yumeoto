<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="YUMEOTO — Minimal offline ambient sound player built for focus and calm.">
    <meta name="theme-color" content="#0f0c13">
    <title>YUMEOTO — Deep Space Engine</title>
    <style>
        :root {
            --bg: #0f0c13;
            --card: #1f1a24;
            --muted: #bfb6c9;
            --accent: #A18BFF;
            --radius: 18px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { touch-action: manipulation; height: 100%; }
        body {
            font-family: Inter, 'Segoe UI', Tahoma, system-ui, sans-serif;
            background: radial-gradient(circle at center top, #1a1423 0%, #0f0c13 80%);
            background-attachment: fixed;
            color: var(--muted);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .fade-out { opacity: 0; transition: opacity 0.5s ease; pointer-events: none; }
        .fade-in { opacity: 1; transition: opacity 0.5s ease; }

        #welcome-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2.5rem;
            z-index: 200;
            background: #121212;
            color: #ffffff;
            transition: opacity 0.5s ease;
        }
        .header-section { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        #welcome-screen h1 { font-size: 2.8rem; font-weight: 300; letter-spacing: 2px; text-align: center; }
        .lower-section { display: flex; flex-direction: column; align-items: center; gap: 1.8rem; padding-bottom: 1rem; }
        .language-toggle { display: flex; gap: 1rem; }
        .lang-btn {
            background-color: transparent; border: 1px solid #555; color: #aaa;
            padding: 0.6rem 2rem; border-radius: 25px; cursor: pointer; font-size: 1rem; transition: all 0.3s ease;
        }
        .lang-btn.active { background-color: #ffffff; color: #121212; border-color: #ffffff; }
        .terms-text { font-size: 0.8rem; color: #888; text-align: center; max-width: 85%; line-height: 1.5; margin: 0; }
        .terms-text a { color: var(--accent); text-decoration: none; }
        .continue-btn {
            background-color: var(--accent); color: #000; border: none; padding: 1.2rem;
            border-radius: 35px; font-size: 1.2rem; font-weight: 600; cursor: pointer;
            width: 100%; max-width: 320px; transition: transform 0.1s ease;
        }
        .continue-btn:active { transform: scale(0.98); }

        #main-app {
            display: none;
            opacity: 0;
            flex: 1;
            flex-direction: column;
            padding-bottom: 90px;
        }

        header { padding: 18px; display: flex; align-items: center; gap: 12px; }
        .logo svg { width: 36px; height: 36px; fill: #fff; }
        .logo-title { font-size: 20px; color: #fff; font-weight: 600; letter-spacing: -0.5px; }
        @keyframes eq {
            0% { height: 6px; y: 11px; }
            50% { height: 16px; y: 1px; }
            100% { height: 10px; y: 7px; }
        }
        body.is-playing .logo rect:nth-child(1) { animation: eq 1s infinite alternate ease-in-out; }
        body.is-playing .logo rect:nth-child(2) { animation: eq 1.2s infinite alternate-reverse ease-in-out; }
        body.is-playing .logo rect:nth-child(3) { animation: eq 0.8s infinite alternate ease-in-out; }
        
        main { flex: 1; padding: 12px; max-width: 920px; margin: 0 auto; width: 100%; }
        h2.engine-title { color: var(--accent); font-size: 11px; font-weight: 700; margin: 24px 8px 12px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
        .card {
            background: var(--card); padding: 16px; border-radius: var(--radius); height: 170px;
            display: flex; flex-direction: column; justify-content: space-between; cursor: pointer;
            border: 2px solid transparent; transition: transform .12s ease, border-color .12s ease, box-shadow .3s ease, background-color .2s;
        }
        .card:active { transform: scale(.98); }
        .card.active { border-color: var(--accent); background: #2a2430; box-shadow: 0 8px 24px rgba(161, 139, 255, 0.12); }
        .icon svg { width: 32px; height: 32px; fill: var(--muted); opacity: .8; transition: fill .2s, opacity .2s; }
        .card.active .icon svg { fill: #fff; opacity: 1; }
        .title { font-size: 15px; color: #fff; font-weight: 600; margin-bottom: 4px; }
        .desc { font-size: 12px; color: var(--muted); opacity: .7; line-height: 1.3; }
        .volume-wrap { opacity: .4; pointer-events: none; display: flex; align-items: center; gap: 8px; transition: opacity .2s; }
        .card.active .volume-wrap { opacity: 1; pointer-events: auto; }
        input[type=range] { -webkit-appearance: none; height: 4px; background: rgba(255,255,255,0.1); border-radius: 999px; width: 100%; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); transition: transform .1s; }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); }
        
        .controls {
            position: fixed; left: 50%; transform: translateX(-50%); bottom: 28px;
            background: rgba(31, 26, 36, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 8px 16px 8px 8px; border-radius: 40px; display: flex; align-items: center; gap: 14px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); z-index: 100;
        }
        .status { min-width: 90px; font-weight: 600; color: var(--muted); display: flex; align-items: center; font-size: 13px; }
        .fab {
            width: 48px; height: 48px; border-radius: 50%; background: var(--accent); color: #000;
            border: none; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .fab svg { width: 22px; height: 22px; fill: currentColor; }
        .playing-dot {
            width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: none;
            margin-right: 10px; animation: pulse 2s infinite ease-in-out;
        }
        body.is-playing .playing-dot { display: inline-block; }
        @keyframes pulse { 
            0% { opacity: 0.4; transform: scale(0.8); } 
            50% { opacity: 1; transform: scale(1.2); } 
            100% { opacity: 0.4; transform: scale(0.8); } 
        }
        .footer { padding: 24px; text-align: center; color: #5a5463; font-size: 12px; margin-top: auto; font-weight: 500; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="header-section">
            <h1 id="welcome-message">Welcome to Yumeoto</h1>
        </div>
        <div class="lower-section">
            <div class="language-toggle">
                <button class="lang-btn active" onclick="setLanguage('en', this)">English</button>
                <button class="lang-btn" onclick="setLanguage('hi', this)">हिंदी</button>
            </div>
            <p class="terms-text" id="terms-message">
                By clicking continue, you agree to our <a href="https://github.com/arumajirohz/yumeoto/blob/main/LICENSE" target="_blank" rel="noopener noreferrer">Copyleft Open Source Licensing terms and conditions</a>.
            </p>
            <button class="continue-btn" id="continue-btn">Continue</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div class="logo">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="7" width="4" height="10" rx="2"/>
                    <rect x="10" y="4" width="4" height="16" rx="2"/>
                    <rect x="17" y="9" width="4" height="6" rx="2"/>
                </svg>
            </div>
            <div class="logo-title">YUMEOTO</div>
        </header>
        
        <main>
            <h2 class="engine-title">Atmosphere Engine</h2>
            <div class="grid">
                <div class="card" data-sound="white">
                    <div class="icon"><svg viewBox="0 0 24 24"><path d="M3 12h3l2-4 3 8 4-12 3 14 2-6h1"/></svg></div>
                    <div><div class="title">White Noise</div><div class="desc">Filtered static mask</div></div>
                    <div class="volume-wrap"><input type="range" min="0" max="1" step="0.01" value="0.3" class="vol-slider"></div>
                </div>
                <div class="card" data-sound="pink">
                    <div class="icon"><svg viewBox="0 0 24 24"><path d="M4 12c4-8 8 8 12 0s4 0 4 0"/></svg></div>
                    <div><div class="title">Pink Noise</div><div class="desc">Soft natural rain</div></div>
                    <div class="volume-wrap"><input type="range" min="0" max="1" step="0.01" value="0.5" class="vol-slider"></div>
                </div>
                <div class="card" data-sound="brown">
                    <div class="icon"><svg viewBox="0 0 24 24"><path d="M2 18c6-12 10-2 14-8s6-2 6-2"/></svg></div>
                    <div><div class="title">Brown Noise</div><div class="desc">Deep space rumble</div></div>
                    <div class="volume-wrap"><input type="range" min="0" max="1" step="0.01" value="0.6" class="vol-slider"></div>
                </div>
            </div>
        </main>
        
        <div class="controls">
            <button class="fab" id="master-play">
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="stop-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 6h12v12H6z"/></svg>
            </button>
            <div class="status">
                <span class="playing-dot"></span>
                <span id="status-text">Idle</span>
            </div>
        </div>
        <footer class="footer">YUMEOTO — Minimal ambient engine for low-CPU devices.</footer>
    </div>

    <script>
        function setLanguage(lang, element) {
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            const gplLink = 'https://github.com/arumajirohz/yumeoto/blob/main/LICENSE';
            
            if (lang === 'hi') {
                document.getElementById('welcome-message').innerText = 'युमेओतो में आपका स्वागत है';
                document.getElementById('terms-message').innerHTML = `जारी रखें पर क्लिक करके, आप हमारे <a href="${gplLink}" target="_blank" rel="noopener noreferrer">कॉपीलेफ्ट ओपन सोर्स लाइसेंसिंग नियमों और शर्तों</a> से सहमत होते हैं।`;
                document.getElementById('continue-btn').innerText = 'जारी रखें';
            } else {
                document.getElementById('welcome-message').innerText = 'Welcome to Yumeoto';
                document.getElementById('terms-message').innerHTML = `By clicking continue, you agree to our <a href="${gplLink}" target="_blank" rel="noopener noreferrer">Copyleft Open Source Licensing terms and conditions</a>.`;
                document.getElementById('continue-btn').innerText = 'Continue';
            }
        }

        document.getElementById('continue-btn').addEventListener('click', () => {
            const welcome = document.getElementById('welcome-screen');
            welcome.classList.add('fade-out');
            
            setTimeout(() => {
                welcome.style.display = 'none';
                const mainApp = document.getElementById('main-app');
                mainApp.style.display = 'flex';
                
                void mainApp.offsetWidth; 
                mainApp.classList.add('fade-in');
                
                initAudio();
            }, 500);
        });

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let masterGain;
        let nodes = {};
        let isPlaying = false;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new AudioContext();
            masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);
        }

        function createNoiseBuffer(type) {
            const bufferSize = 2 * audioCtx.sampleRate;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            let lastOut = 0.0;

            for (let i = 0; i < bufferSize; i++) {
                const white = Math.random() * 2 - 1;
                
                if (type === 'brown') {
                    data[i] = (lastOut + (0.02 * white)) / 1.002;
                    lastOut = data[i];
                    data[i] *= 3.5;
                } else if (type === 'pink') {
                    data[i] = (lastOut + (0.02 * white)) / 1.02;
                    lastOut = data[i];
                    data[i] *= 3.5;
                } else {
                    data[i] = white;
                }
            }
            return buffer;
        }

        function toggleSound(soundType, card) {
            initAudio();
            
            if (nodes[soundType]) {
                nodes[soundType].source.stop();
                delete nodes[soundType];
                card.classList.remove('active');
                updatePlayingStatus();
            } else {
                const source = audioCtx.createBufferSource();
                source.buffer = createNoiseBuffer(soundType);
                source.loop = true;

                const gain = audioCtx.createGain();
                const slider = card.querySelector('.vol-slider');
                gain.gain.value = parseFloat(slider.value);

                source.connect(gain);
                gain.connect(masterGain);
                source.start();

                nodes[soundType] = { source, gain, card };
                card.classList.add('active');
                updatePlayingStatus();
            }
        }

        function updateVolume(soundType, value) {
            if (nodes[soundType]) {
                nodes[soundType].gain.gain.value = parseFloat(value);
            }
        }

        function updatePlayingStatus() {
            const activeSounds = Object.keys(nodes).length;
            isPlaying = activeSounds > 0;
            document.body.classList.toggle('is-playing', isPlaying);
            document.getElementById('status-text').innerText = isPlaying ? `Playing (${activeSounds})` : 'Idle';
        }

        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', () => {
                const soundType = card.dataset.sound;
                toggleSound(soundType, card);
            });

            const slider = card.querySelector('.vol-slider');
            if (slider) {
                slider.addEventListener('input', (e) => {
                    const soundType = card.dataset.sound;
                    updateVolume(soundType, e.target.value);
                });
                slider.addEventListener('click', (e) => {
                    e.stopPropagation();
                });
            }
        });

        const masterBtn = document.getElementById('master-play');
        masterBtn.addEventListener('click', () => {
            initAudio();
            
            if (isPlaying) {
                Object.values(nodes).forEach(node => {
                    node.source.stop();
                    node.card.classList.remove('active');
                });
                nodes = {};
                isPlaying = false;
                document.body.classList.remove('is-playing');
                document.getElementById('status-text').innerText = 'Idle';
                document.getElementById('play-icon').style.display = 'block';
                document.getElementById('stop-icon').style.display = 'none';
            }
        });
    </script>
</body>
</html>
